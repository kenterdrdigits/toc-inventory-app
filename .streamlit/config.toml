# Light, clean Apple-style theme + larger upload cap.
# NOTE: never put secrets here — those go in .streamlit/secrets.toml (which is gitignored).

[theme]
base = "light"
primaryColor = "#0071E3"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F5F5F7"
textColor = "#1D1D1F"
font = "sans serif"

[server]
# Streamlit's own per-file upload cap (MB). Default is 200; we raise it for the
# multi-year sales export. (Supabase Storage has a separate ~50MB free-tier cap.)
maxUploadSize = 500
